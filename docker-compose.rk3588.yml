services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/data
      - ./data/logs:/mosquitto/log

  guardian-core:
    build:
      context: .
      dockerfile: apps/guardian-core/Dockerfile
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      - mosquitto
    env_file:
      - .env
    environment:
      APP_ENV: production
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DATABASE_URL: sqlite:////app/data/guardian.db
      LLM_MOCK: ${LLM_MOCK:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro

  web-dashboard:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      network: host
      args:
        APP_DIR: apps/web-dashboard
        VITE_GUARDIAN_API_BASE: ${PUBLIC_GUARDIAN_API_BASE:-http://192.168.10.64:8000}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      - guardian-core
    ports:
      - "5173:80"

  elder-hmi:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      network: host
      args:
        APP_DIR: apps/elder-hmi
        VITE_GUARDIAN_API_BASE: ${PUBLIC_GUARDIAN_API_BASE:-http://192.168.10.64:8000}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      - guardian-core
    ports:
      - "5174:80"

  wechat-adapter:
    build:
      context: .
      dockerfile: deploy/docker/python-app.Dockerfile
      network: host
      args:
        APP_DIR: apps/wechat-adapter
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    environment:
      GUARDIAN_CORE_URL: http://guardian-core:8000
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8102"]
    ports:
      - "8102:8102"

  vision-service:
    build:
      context: .
      dockerfile: deploy/docker/python-app.Dockerfile
      network: host
      args:
        APP_DIR: apps/vision-service
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      ELDER_ID: ${ELDER_ID:-elder_001}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8101"]
    ports:
      - "8101:8101"

  voice-hmi-service:
    build:
      context: .
      dockerfile: deploy/docker/python-app.Dockerfile
      network: host
      args:
        APP_DIR: apps/voice-hmi-service
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      ELDER_ID: ${ELDER_ID:-elder_001}
    command: ["python", "-m", "app.main", "--listen-only"]

[project]
name = "guardian-shared"
version = "0.1.0"
description = "Shared schemas and MQTT topics for the RK3588 elder guardian agent."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7,<3"
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["guardian_shared*"]

